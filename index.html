<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Tribal Brawl - Barbarian</title>
    <style>
        body { margin: 0; overflow: hidden; background: #7ab87a; }
        #instructions { position: absolute; top: 10px; left: 10px; color: white; font-family: sans-serif; pointer-events: none; }
    </style>
</head>
<body>
    <div id="instructions">Tribal Brawl v0.1 - Barbarian Jelly Mode</div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

    <script>
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        camera.position.set(0, 5, 10);

        // Pencahayaan
        scene.add(new THREE.AmbientLight(0xffffff, 0.7));
        const light = new THREE.DirectionalLight(0xffffff, 1);
        light.position.set(5, 5, 5);
        scene.add(light);

        let barbarian;
        const loader = new THREE.GLTFLoader();
        const texLoader = new THREE.TextureLoader();

        // Load Karakter
        loader.load('Barbarian.glb', (gltf) => {
            barbarian = gltf.scene;
            const texture = texLoader.load('barbarian_texture.png');
            texture.flipY = false;

            barbarian.traverse(node => {
                if (node.isMesh) node.material.map = texture;
            });
            
            barbarian.scale.set(2, 2, 2);
            scene.add(barbarian);
        });

        // Loop Animasi & Efek Jelly
        function animate() {
            requestAnimationFrame(animate);
            
            if (barbarian) {
                const time = Date.now() * 0.003;
                
                // Efek Napas (Skala naik-turun)
                const breath = 1 + Math.sin(time) * 0.02;
                barbarian.scale.set(2 * breath, 2, 2 * breath);

                // Efek Jelly (Goyangan tiap bone)
                barbarian.traverse(node => {
                    if (node.isBone && node.name.includes('mixamorig')) {
                        node.rotation.z = Math.sin(time + node.id) * 0.03;
                    }
                });
            }

            controls.update();
            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
