<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

/* ── FULLSCREEN REDMI 10 - PUNCH HOLE COVER ── */
:root {
  --sat: env(safe-area-inset-top, 0px);
  --sab: env(safe-area-inset-bottom, 0px);
  --sal: env(safe-area-inset-left, 0px);
  --sar: env(safe-area-inset-right, 0px);
}

html, body {
  width: 100%; height: 100%;
  background: black;
  overflow: hidden;
  font-family: sans-serif;
  /* Paksa konten ke seluruh layar termasuk punch-hole area */
  padding: 0;
  margin: 0;
}

/* Cover seluruh layar termasuk area punch-hole dan edge */
.screen, #slide-transition, #modal-dim, #rotate-overlay {
  top: 0; left: 0; right: 0; bottom: 0;
}

/* ── TAP TO START OVERLAY ── */
#tap-start {
  position: fixed; inset: 0;
  background: #000;
  z-index: 99999;
  display: flex;
  align-items: center;
  justify-content: center;
  -webkit-tap-highlight-color: transparent;
  cursor: pointer;
  user-select: none;
}

/* ── SCREENS ── */
.screen {
  position: fixed; inset: 0;
  background: black;
  display: flex; align-items: center; justify-content: center;
  opacity: 0; pointer-events: none;
  transition: opacity 0.5s ease;
}
.screen.active { opacity: 1; pointer-events: all; }

#img-splash, #img-loadbg {
  position: absolute; inset: 0;
  width: 100%; height: 100%;
  object-fit: cover; object-position: center;
}

/* ── LOADING SCREEN (WATERMARK STYLE) ── */
#screen-load {
  background: #e8e8e8 !important;
}

#img-loadbg { display: none !important; }

#watermark-img {
  position: absolute;
  inset: 0;
  width: 100%; height: 100%;
  object-fit: cover;
  object-position: center;
  display: block;
  z-index: 0;
}

.wm-corner {
  position: absolute;
  color: #444;
  line-height: 1.45;
  z-index: 1;
  font-family: Arial, sans-serif;
}

#wm-top-left {
  top: 22px; left: 24px;
  font-size: clamp(9px, 1.1vw, 13px);
}
#wm-top-left .wm-version { font-weight: 700; color: #444; display: block; }
#wm-top-left .wm-server  { font-weight: 400; color: #444; display: block; font-size: clamp(8px, 1vw, 12px); }

#wm-bot-left {
  bottom: 20px; left: 22px;
  display: flex; align-items: center; gap: 8px;
  z-index: 1;
}
.wm-spinner {
  width: clamp(10px, 1.4vw, 14px);
  height: clamp(10px, 1.4vw, 14px);
  border-radius: 50%;
  border: 2px solid #ccc;
  border-top-color: #444;
  animation: wmSpin 0.7s linear infinite;
  flex-shrink: 0;
}
@keyframes wmSpin { to { transform: rotate(360deg); } }

#wm-status-label {
  font-weight: 700; color: #444;
  font-size: clamp(9px, 1.15vw, 13px);
}
#wm-status-sub {
  font-weight: 400; color: #444;
  font-size: clamp(9px, 1.15vw, 13px);
}

#wm-bot-right {
  bottom: 20px; right: 22px;
  font-size: clamp(8px, 1vw, 12px);
  color: #444; font-weight: 400;
  z-index: 1;
}

/* Account Modal */
#account-modal-dim {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.45);
  z-index: 99985;
  display: none;
  align-items: center;
  justify-content: center;
}
#account-modal-dim.show { display: flex; }

#account-modal {
  background: #fff;
  border-radius: 18px;
  padding: 18px 20px 16px;
  width: min(340px, 85vw);
  max-height: 85vh;
  overflow-y: auto;
  box-shadow: 0 16px 40px rgba(0,0,0,0.22);
  display: flex; flex-direction: column; gap: 9px;
  transform: translateY(60px);
  opacity: 0;
  transition: transform 0.4s cubic-bezier(0.34,1.56,0.64,1), opacity 0.35s ease;
}
#account-modal.open { transform: translateY(0); opacity: 1; }
#account-modal.closing {
  transform: translateY(60px); opacity: 0;
  transition: transform 0.28s ease, opacity 0.25s ease;
}
.modal-title { font-family: Arial,sans-serif; font-size: clamp(13px,1.6vw,15px); font-weight: 800; color: #1a1a1a; line-height: 1.2; }
.modal-desc  { font-family: Arial,sans-serif; font-size: clamp(9px,1vw,11px); color: #888; line-height: 1.5; margin-top: -4px; }
.modal-avatar-wrap { display: flex; justify-content: center; margin: 2px 0; }
#avatar-btn {
  width: clamp(48px,6vw,58px); height: clamp(48px,6vw,58px);
  border-radius: 50%; overflow: hidden;
  border: 2.5px solid #eee; cursor: pointer;
  position: relative; flex-shrink: 0;
  background: #f0f0f0; transition: border-color 0.2s;
}
#avatar-btn:hover { border-color: #bbb; }
#avatar-btn img { width: 100%; height: 100%; object-fit: cover; display: block; }
#avatar-btn .avatar-edit {
  position: absolute; inset: 0;
  background: rgba(0,0,0,0.28);
  display: flex; align-items: center; justify-content: center;
  opacity: 0; transition: opacity 0.2s; font-size: 14px; color: #fff;
}
#avatar-btn:hover .avatar-edit { opacity: 1; }
#avatar-input { display: none; }
.modal-fields { display: flex; flex-direction: column; gap: 7px; }
.field-group  { display: flex; flex-direction: column; gap: 3px; }
.field-label  { font-family: Arial,sans-serif; font-size: clamp(8px,0.9vw,10px); color: #999; font-weight: 600; letter-spacing: 0.3px; }
.field-input  {
  width: 100%; background: #f5f5f5;
  border: 1.5px solid #e0e0e0; border-radius: 999px;
  padding: 7px 13px;
  font-family: Arial,sans-serif; font-size: clamp(10px,1.2vw,12px);
  color: #222; outline: none; transition: border-color 0.2s;
}
.field-input:focus { border-color: #aaa; background: #fff; }
.field-input.error { border-color: #ff5555; background: #fff5f5; }
.field-hint   { font-family: Arial,sans-serif; font-size: clamp(7px,0.85vw,9px); color: #bbb; padding-left: 12px; }
#btn-create   {
  width: 100%; padding: 9px; border-radius: 999px;
  background: #1a1a1a; color: #fff;
  font-family: Arial,sans-serif; font-size: clamp(11px,1.3vw,13px);
  font-weight: 700; border: none; cursor: pointer;
  transition: opacity 0.2s, transform 0.1s; margin-top: 2px;
}
#btn-create:active { opacity: 0.8; transform: scale(0.98); }
#modal-field-error {
  font-family: Arial,sans-serif; font-size: clamp(8px,1vw,10px);
  color: #ff5555; text-align: center; min-height: 14px;
  opacity: 0; transition: opacity 0.2s;
}
#modal-field-error.show { opacity: 1; }

/* ── BOTTOM PILL TAB ── */
#bottom-tab {
  display: none;
  align-self: center;
  padding: 10px 36px;
  border-radius: 999px;
  border: 1.5px solid rgba(255,255,255,0.45);
  background: rgba(0,0,0,0.5);
  color: white;
  font-size: 13px;
  font-weight: 600;
  letter-spacing: 0.4px;
  cursor: pointer;
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  user-select: none;
  transform-origin: center bottom;
}
#bottom-tab:active { transform: scale(0.94); }
#bottom-tab.show {
  display: block;
  animation: spring-tab-in 0.5s ease forwards;
}
#bottom-tab.hiding {
  animation: spring-tab-out 0.28s ease forwards;
}

/* ── NOTIFICATION PILL ── */
#notif-pill {
  position: fixed;
  top: 20px; left: 50%;
  transform: translateX(-50%) translateY(-120px);
  display: flex; align-items: center; gap: 10px;
  padding: 7px 16px 7px 8px;
  border-radius: 999px;
  border: 1.5px solid rgba(255,255,255,0.25);
  background: rgba(15,15,15,0.88);
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
  color: white;
  font-size: 12px;
  font-weight: 500;
  z-index: 9000;
  opacity: 0;
  white-space: nowrap;
  pointer-events: none;
}
#notif-pill.show {
  animation: spring-slide-down 0.55s ease forwards;
}
#notif-pill.hide {
  animation: spring-slide-up 0.35s ease forwards;
}
#notif-avatar {
  width: 28px; height: 28px;
  border-radius: 50%;
  object-fit: cover;
  background: #333;
  flex-shrink: 0;
}

/* ── MODAL DIM ── */
#modal-dim {
  display: none;
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.78);
  z-index: 4500;
  align-items: center; justify-content: center;
}
#modal-dim.show { display: flex; animation: dim-in 0.25s ease forwards; }
#modal-dim.closing { animation: dim-out 0.25s ease forwards; }

/* ── POPUP ANIMATIONS (universal: bawah → atas, pop effect) ── */

/* Muncul: dari bawah naik, smooth tanpa bounce */
@keyframes popup-in {
  0%   { transform: translateY(32px); opacity: 0; }
  100% { transform: translateY(0);    opacity: 1; }
}

/* Tutup: turun smooth */
@keyframes popup-out {
  0%   { transform: translateY(0);    opacity: 1; }
  100% { transform: translateY(32px); opacity: 0; }
}

/* Notif pill: dari atas turun */
@keyframes spring-slide-down {
  0%   { transform: translateX(-50%) translateY(-50px); opacity: 0; }
  100% { transform: translateX(-50%) translateY(0);     opacity: 1; }
}
@keyframes spring-slide-up {
  0%   { transform: translateX(-50%) translateY(0)     scale(1);   opacity: 1; }
  100% { transform: translateX(-50%) translateY(-60px) scale(0.9); opacity: 0; }
}

/* Bottom tab pill */
@keyframes spring-tab-in {
  0%   { transform: translateY(16px); opacity: 0; }
  100% { transform: translateY(0);    opacity: 1; }
}
@keyframes spring-tab-out {
  0%   { transform: translateY(0);    opacity: 1; }
  100% { transform: translateY(16px); opacity: 0; }
}

#modal-account {
  background: #1c1c1c;
  border-radius: 22px;
  padding: 24px 22px;
  width: 380px;
  max-width: 92vw;
  color: white;
  display: flex;
  flex-direction: column;
  gap: 14px;
  transform-origin: center center;
  animation: popup-in 0.42s cubic-bezier(0.4,0,0.2,1) forwards;
}
#modal-account.closing {
  animation: popup-out 0.26s cubic-bezier(0.4,0,0.2,1) forwards;
}

#modal-account h2 {
  font-size: 17px;
  font-weight: 700;
}

.modal-desc {
  font-size: 12px;
  color: rgba(255,255,255,0.5);
  margin-top: -6px;
  line-height: 1.55;
}

.profile-row {
  display: flex;
  align-items: center;
  gap: 16px;
}

#avatar-wrap {
  position: relative;
  width: 68px; height: 68px;
  flex-shrink: 0;
  cursor: pointer;
}
#avatar-preview {
  width: 68px; height: 68px;
  border-radius: 50%;
  object-fit: cover;
  border: 2px solid rgba(255,255,255,0.15);
  background: #2a2a2a;
  display: block;
}
#avatar-edit-icon {
  position: absolute; bottom: 1px; right: 1px;
  width: 20px; height: 20px;
  border-radius: 50%;
  background: rgba(255,255,255,0.12);
  border: 1.5px solid rgba(255,255,255,0.25);
  display: flex; align-items: center; justify-content: center;
  font-size: 10px;
}
#avatar-input { display: none; }

.fields-col {
  flex: 1;
  display: flex; flex-direction: column;
  gap: 10px;
}

.field-group { display: flex; flex-direction: column; gap: 4px; }

.field-label {
  font-size: 11px;
  color: rgba(255,255,255,0.55);
}
.field-input {
  width: 100%;
  background: rgba(255,255,255,0.07);
  border: 1.5px solid rgba(255,255,255,0.12);
  border-radius: 10px;
  padding: 8px 11px;
  color: white;
  font-size: 13px;
  outline: none;
  transition: border-color 0.2s;
}
.field-input::placeholder { color: rgba(255,255,255,0.25); }
.field-input:focus { border-color: rgba(255,255,255,0.35); }
.field-input.error { border-color: #ff5555; }
.field-hint {
  font-size: 10px;
  color: rgba(255,255,255,0.28);
}

#btn-save {
  width: 100%;
  padding: 12px;
  border-radius: 999px;
  background: white;
  color: black;
  font-size: 14px;
  font-weight: 700;
  border: none;
  cursor: pointer;
  transition: opacity 0.2s;
}
#btn-save:active { opacity: 0.8; }

/* ── LOBBY LAYER CAROUSEL ── */
#lobby-layers {
  position: absolute; inset: 0;
  overflow: hidden;
  z-index: 2;
}
.lobby-layer {
  position: absolute; inset: 0;
  width: 100%; height: 100%;
  object-fit: cover;
  object-position: center;
  /* JS mengontrol transform + filter langsung via style */
  will-change: transform, filter;
  transition: none;
}


/* ── LAYER 2 OVERLAY (elemen yang ikut geser dengan 2.png) ── */
#layer2-overlay {
  position: absolute;
  inset: 0;
  z-index: 5;
  pointer-events: none; /* diaktifkan via JS saat layer 2 tampil */
  opacity: 1;
  transition: opacity 0.28s cubic-bezier(0.4,0,0.2,1);
}
#layer2-overlay > * { pointer-events: all; }
#layer2-overlay.fading { opacity: 0; pointer-events: none; }

/* ── MAIN MENU SCREEN ── */
#screen-menu {
  position: fixed; inset: 0;
  opacity: 0; pointer-events: none;
  transition: opacity 0.5s ease;
  z-index: 1;
}
#screen-menu.active { opacity: 1; pointer-events: all; }

#lobby-bg {
  position: absolute; inset: 0;
  width: 100%; height: 100%;
  object-fit: cover; object-position: center;
}

#menu-content {
  position: absolute; inset: 0;
  z-index: 10;
  font-family: 'Fredoka', sans-serif;
}

/* ── LOBBY LAYOUT ── */
.lobby-left {
  position: absolute;
  left: 4%;
  top: 50%;
  transform: translateY(-50%);
  display: flex;
  flex-direction: column;
  gap: 6px;
}

.lobby-menu-item {
  display: flex;
  align-items: center;
  gap: 12px;
  cursor: pointer;
  user-select: none;
  -webkit-tap-highlight-color: transparent;
  transition: transform 0.22s cubic-bezier(0.34,1.56,0.64,1),
              opacity 0.2s ease;
}
.lobby-menu-item:active { transform: scale(0.94); }

/* Default: teks polos, pill tersembunyi */
.lobby-menu-item .menu-pill { display: none; }
.lobby-menu-item .menu-label {
  font-size: clamp(13px, 1.8vw, 22px);
  font-weight: 600;
  color: #fff8e7;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  text-shadow: 0 2px 6px rgba(0,0,0,0.35);
  transition: color 0.18s ease;
}
.lobby-menu-item:hover .menu-label { color: #ffe08a; }

/* Active: sembunyikan teks luar, tampilkan pill */
.lobby-menu-item.active > .menu-label { display: none; }
.lobby-menu-item.active .menu-pill {
  display: flex;
  align-items: center;
  gap: 10px;
  background: #fff8e7;
  border: 3px solid #e8a020;
  border-radius: 999px;
  padding: 10px 28px 10px 18px;
  box-shadow: 0 4px 0 #c47a10, 0 6px 16px rgba(0,0,0,0.25);
  animation: pill-pop 0.3s cubic-bezier(0.34,1.56,0.64,1) forwards;
}
@keyframes pill-pop {
  0%   { transform: scale(0.75); opacity: 0.4; }
  100% { transform: scale(1);    opacity: 1; }
}
.lobby-menu-item.active .menu-arrow {
  width: 0; height: 0;
  border-top: 10px solid transparent;
  border-bottom: 10px solid transparent;
  border-left: 16px solid #e8a020;
  flex-shrink: 0;
}
.lobby-menu-item.active .menu-pill .menu-label {
  font-size: clamp(16px, 2.2vw, 26px);
  font-weight: 700;
  color: #1a1a1a;
  text-shadow: none;
  letter-spacing: 0.5px;
}

/* ── CENTER CHARACTER ── */
.lobby-center {
  position: absolute;
  left: 50%;
  bottom: 60px;
  transform: translateX(-50%);
  width: clamp(280px, 38vw, 520px);
  pointer-events: none;
}
.lobby-center img {
  width: 100%;
  height: auto;
  object-fit: contain;
  filter: drop-shadow(0 20px 30px rgba(0,0,0,0.3));
}

/* ── RIGHT CARDS ── */
.lobby-right {
  position: absolute;
  right: 2.5%;
  top: 50%;
  transform: translateY(-52%);
  display: flex;
  flex-direction: column;
  gap: 10px;
}
.lobby-card {
  width: clamp(140px, 18vw, 220px);
  aspect-ratio: 16/10;
  border-radius: 16px;
  overflow: hidden;
  cursor: pointer;
  position: relative;
  box-shadow: 0 4px 20px rgba(0,0,0,0.3);
  transition: transform 0.22s cubic-bezier(0.34,1.56,0.64,1), box-shadow 0.22s ease;
  -webkit-tap-highlight-color: transparent;
}
.lobby-card:active { transform: scale(0.96); }
.lobby-card img {
  width: 100%; height: 100%;
  object-fit: cover;
  display: block;
}
.lobby-card-dots {
  position: absolute;
  bottom: 7px; left: 0; right: 0;
  display: flex; justify-content: center; gap: 4px;
}
.lobby-card-dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: rgba(255,255,255,0.45);
}
.lobby-card-dot.active { background: white; }

/* ── BOTTOM BAR ── */
.lobby-bottom {
  position: absolute;
  bottom: 0; left: 0; right: 0;
  height: 38px;
  background: rgba(230,185,55,0.93);
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  border-top: 1.5px solid rgba(255,255,255,0.28);
  display: flex;
  align-items: center;
  padding: 0 10px;
  gap: 6px;
}

/* Left bar items */
.bar-left {
  display: flex; align-items: center; gap: 6px;
  flex: 1;
}
.bar-btn {
  display: flex; align-items: center; gap: 4px;
  background: rgba(255,255,255,0.3);
  border: 1.5px solid rgba(255,255,255,0.45);
  border-radius: 999px;
  padding: 4px 10px 4px 5px;
  height: 28px;
  box-sizing: border-box;
  cursor: pointer;
  transition: background 0.25s cubic-bezier(0.4,0,0.2,1),
              transform 0.2s cubic-bezier(0.34,1.56,0.64,1);
  -webkit-tap-highlight-color: transparent;
  position: relative;
}
.bar-btn:active {
  background: rgba(255,255,255,0.5);
  transform: scale(0.93);
}
.bar-btn-icon {
  width: 22px; height: 22px;
  border-radius: 50%;
  object-fit: cover;
  background: rgba(0,0,0,0.12);
  flex-shrink: 0;
}
.bar-btn-label {
  font-family: 'Fredoka', sans-serif;
  font-size: 11px;
  font-weight: 600;
  color: #2e1d00;
  text-transform: uppercase;
  letter-spacing: 0.3px;
}
.bar-btn-badge {
  position: absolute;
  top: -3px; left: 18px;
  background: #e83030;
  color: white;
  font-size: 8px;
  font-weight: 700;
  font-family: 'Fredoka', sans-serif;
  border-radius: 999px;
  padding: 1px 4px;
  border: 1.5px solid white;
}
.bar-currency {
  display: flex; align-items: center; gap: 4px;
  background: rgba(255,255,255,0.3);
  border: 1.5px solid rgba(255,255,255,0.45);
  border-radius: 999px;
  padding: 0 10px 0 6px;
  height: 28px;
  box-sizing: border-box;
  transition: transform 0.2s cubic-bezier(0.34,1.56,0.64,1);
}
.bar-currency:active { transform: scale(0.93); }
.bar-currency-icon {
  width: 18px; height: 18px;
  object-fit: contain;
}
.bar-currency-val {
  font-family: 'Fredoka', sans-serif;
  font-size: 12px;
  font-weight: 700;
  color: #2e1d00;
}
.bar-more {
  width: 28px; height: 28px;
  border-radius: 50%;
  background: rgba(255,255,255,0.3);
  border: 1.5px solid rgba(255,255,255,0.45);
  display: flex; align-items: center; justify-content: center;
  cursor: pointer;
  font-size: 13px;
  color: #2e1d00;
  transition: transform 0.2s cubic-bezier(0.34,1.56,0.64,1);
}
.bar-more:active { transform: scale(0.88); }

/* Center bar */
.bar-center {
  flex: 0 0 auto;
  display: flex; align-items: center; gap: 6px;
}
.bar-confirm {
